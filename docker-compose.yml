services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dataops
      POSTGRES_PASSWORD: dataops
      POSTGRES_DB: dataops
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./apps/api
    env_file: [./apps/api/.env.example]
    ports: ["4000:4000"]
    depends_on: [postgres, redis]
  web:
    build: ./apps/web
    env_file: [./apps/web/.env.example]
    ports: ["3000:3000"]
    depends_on: [api]
